# Nginx configuration for Tej IT Solutions Billing System

server {
    listen 80;
    server_name billing.tejitsolutions.com localhost;

    # Redirect HTTP to HTTPS (uncomment for SSL)
    # return 301 https://$server_name$request_uri;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # File upload size limit
    client_max_body_size 50M;

    # Proxy settings
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files
    location /static/ {
        alias /var/www/tej-billing/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Gzip compression
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
    }

    # File uploads (secured)
    location /uploads/ {
        internal;
        alias /var/www/tej-billing/app/static/uploads/;
    }

    # Favicon
    location /favicon.ico {
        alias /var/www/tej-billing/app/static/favicon.ico;
        expires 30d;
    }

    # Robots.txt
    location /robots.txt {
        alias /var/www/tej-billing/app/static/robots.txt;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        internal;
        root /var/www/tej-billing/app/templates/errors/;
    }
    
    location = /50x.html {
        internal;
        root /var/www/tej-billing/app/templates/errors/;
    }
}

