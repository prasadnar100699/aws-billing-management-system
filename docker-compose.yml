# Docker Compose configuration for Tej IT Solutions Billing System
version: '3.8'

services:
  # Flask application
  web:
    build: .
    container_name: tej-billing-web
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://billing_user:secure_password@db:3306/tej_billing_db
      - JWT_SECRET_KEY=your-super-secret-jwt-key-here
      - ENCRYPTION_KEY=your-32-character-encryption-key
      - MAIL_USERNAME=billing@tejitsolutions.com
      - MAIL_PASSWORD=your-email-password
    volumes:
      - ./app/static/uploads:/app/app/static/uploads
      - ./logs:/var/log/tej-billing
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL database
  db:
    image: mysql:8.0
    container_name: tej-billing-db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password_here
      - MYSQL_DATABASE=tej_billing_db
      - MYSQL_USER=billing_user
      - MYSQL_PASSWORD=secure_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup:/backup
    ports:
      - "3306:3306"
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # Redis for session management and caching
  redis:
    image: redis:7-alpine
    container_name: tej-billing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: tej-billing-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./app/static:/var/www/tej-billing/app/static:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: