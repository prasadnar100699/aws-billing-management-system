version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: aws_billing_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: aws_billing_system
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin@9955
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - aws_billing_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aws_billing_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aws_billing_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aws_billing_backend
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=your-super-secret-jwt-key-for-aws-billing-system-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=aws_billing_system
      - DB_USER=admin
      - DB_PASSWORD=admin@9955
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=your-super-secret-jwt-key-for-aws-billing-system-2024
      - JWT_ACCESS_TOKEN_EXPIRES=86400
      - CORS_ORIGINS=http://localhost:3002,http://frontend:3002
      - UPLOAD_DIR=/app/uploads
    ports:
      - "5002:5002"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aws_billing_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/health"]
      timeout: 10s
      retries: 5

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aws_billing_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5002/api
      - JWT_SECRET=your-super-secret-jwt-key-for-aws-billing-system-2024
    ports:
      - "3002:3002"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aws_billing_network

  # Celery Worker (for background tasks)
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aws_billing_celery
    command: celery -A celery_app.celery worker --loglevel=info
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=your-super-secret-jwt-key-for-aws-billing-system-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=aws_billing_system
      - DB_USER=admin
      - DB_PASSWORD=admin@9955
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=your-super-secret-jwt-key-for-aws-billing-system-2024
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aws_billing_network

volumes:
  mysql_data:
  redis_data:
  backend_uploads:

networks:
  aws_billing_network:
    driver: bridge